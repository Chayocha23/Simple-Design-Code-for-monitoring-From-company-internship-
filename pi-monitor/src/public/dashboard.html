<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi-Monitoring Real-time Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f1f5f9; /* เทาอ่อนนุ่มนวล สไตล์มินิมอล */
            color: #1e293b; /* ตัวอักษรสีน้ำเงินเข้มจัด อ่านง่ายชัดเจน */
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        .container {
            flex: 1;
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 { 
            margin: 0; 
            color: #0f172a; 
            font-size: 32px; 
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .header h1 span {
            color: #3b82f6; /* สีน้ำเงินสถิติเสริมความโปร */
        }
        .header p { 
            margin: 10px 0 0 0; 
            color: #64748b; 
            font-size: 16px;
        }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
        }

        /* โครงสร้างการ์ดรายหน้าจอ */
        .card {
            background-color: #ffffff;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid #e2e8f0;
            border-bottom: 4px solid #cbd5e1;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        
        /* สถานะ ONLINE: ขอบล่างสีเขียว */
        .card.healthy { 
            border-bottom-color: #10b981; 
        }
        /* สถานะ OFFLINE: ขอบรอบทิศสีแดง + มีเงาสะท้อนกะพริบ */
        .card.offline { 
            border: 1px solid #fee2e2;
            border-bottom: 4px solid #ef4444; 
            animation: cardPulse 2s infinite;
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 12px;
        }
        .display-name { 
            font-size: 24px; 
            font-weight: 700; 
            color: #0f172a; 
        }
        
        /* สไตล์ Badge สถานะ */
        .badge-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-badge {
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .healthy .status-badge { 
            background-color: #d1fae5; 
            color: #065f46; 
        }
        .offline .status-badge { 
            background-color: #fee2e2; 
            color: #991b1b; 
        }
        
        /* จุดไฟสถานะ Dot */
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        .healthy .status-dot { 
            background-color: #10b981; 
        }
        .offline .status-dot { 
            background-color: #ef4444;
            animation: dotPulse 1.2s infinite;
        }
        
        /* ส่วนเนื้อหาในข้อความรายละเอียด */
        .info-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .info-block {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .info-label {
            font-size: 12px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .info-value { 
            color: #334155; 
            font-weight: 500; 
            font-size: 15px;
        }
        .healthy .info-value-status {
            color: #059669;
            font-weight: 600;
        }
        .offline .info-value-status {
            color: #dc2626;
            font-weight: 600;
        }

        /* แถบรายงานด้านล่างสุดของเว็บ */
        .footer-bar {
            background-color: #ffffff;
            border-top: 1px solid #e2e8f0;
            padding: 16px;
            text-align: center;
            font-size: 14px;
            color: #64748b;
            font-weight: 500;
            box-shadow: 0 -4px 6px -1px rgba(0, 0, 0, 0.02);
        }

        /* เอฟเฟกต์แอนิเมชันสำหรับเครื่องมีปัญหา */
        @keyframes cardPulse {
            0% { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
            50% { box-shadow: 0 0 12px rgba(239, 68, 68, 0.15); }
            100% { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        }
        @keyframes dotPulse {
            0% { transform: scale(0.9); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.6; }
            100% { transform: scale(0.9); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                ระบบมอนิเตอร์หน้าจอไลน์ผลิตส่วนกลาง
            </h1>
            <p>สถานะการทำงานของบอร์ด Raspberry Pi (อัปเดตอัตโนมัติทุกๆ 5 นาที ตามรอบการตรวจเช็กระบบ)</p>
        </div>

        <div class="grid-container" id="monitor-grid">
            </div>
    </div>

    <div class="footer-bar" id="footer-update-time">
        สถานะล่าสุด: กำลังเชื่อมต่อฐานข้อมูล...
    </div>

    <script>
        async function updateDashboard() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                const grid = document.getElementById('monitor-grid');
                grid.innerHTML = ''; // เคลียร์เพื่ออัปเดตข้อมูลใหม่ให้สัมพันธ์กับ Log

                Object.keys(data).forEach(name => {
                    const info = data[name];
                    const cardClass = info.isHealthy ? 'healthy' : 'offline';
                    const badgeText = info.isHealthy ? 'ONLINE' : 'OFFLINE';

                    const cardHtml = `
                        <div class="card ${cardClass}">
                            <div class="card-header">
                                <div class="display-name">${name}</div>
                                <div class="badge-container">
                                    <span class="status-badge">${badgeText}</span>
                                    <span class="status-dot"></span>
                                </div>
                            </div>
                            <div class="info-section">
                                <div class="info-block">
                                    <span class="info-label">Info Status</span>
                                    <span class="info-value info-value-status">${info.status}</span>
                                </div>
                                <div class="info-block">
                                    <span class="info-label">Last Check</span>
                                    <span class="info-value">${info.lastCheck}</span>
                                </div>
                            </div>
                        </div>
                    `;
                    grid.innerHTML += cardHtml;
                });

                // อัปเดตเวลาการทำงานล่าสุดที่ด้านล่างสุดของเว็บแอป
                const currentTime = new Date().toLocaleTimeString("th-TH");
                document.getElementById('footer-update-time').innerText = `ระบบทำงานปกติ • อัปเดตข้อมูลล่าสุดเมื่อ: ${currentTime}`;
                
            } catch (error) {
                console.error('❌ ไม่สามารถดึงข้อมูลสถานะจากหลังบ้านได้:', error);
                document.getElementById('footer-update-time').innerText = `⚠️ ขัดข้อง: ไม่สามารถดึงข้อมูลจากหลังบ้านได้ ณ เวลา ${new Date().toLocaleTimeString("th-TH")}`;
            }
        }

        // เริ่มต้นเรียกทำงานทันทีครั้งแรก
        updateDashboard();
        
        // 🎯 ปรับเปลี่ยนเวลาลูปตรงนี้จาก 2000 เป็น 300000 ms (เท่ากับ 5 นาทีเต็มพอดีครับ)
        setInterval(updateDashboard, 2000);
    </script>
</body>
</html>
